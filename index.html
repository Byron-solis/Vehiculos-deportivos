<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="carros.css">
    <link rel="icon" type="imagen/jfif" href="logo.jfif.jpeg">
</head>
<body>
    <div id="login-container" class="card">
        <h2>Iniciar Sesión</h2>
        <p>Introduce tus datos para entrar</p>

        <button onclick="validarAcceso()">Entrar</button>
        <p id="mensaje-error" class="error"></p>
    </div>
    <script src="carros.js"></script>
</body>
</html>
